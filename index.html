<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮光 - 免费在线观看</title>
    <script>
        try {
            document.documentElement.dataset.theme = JSON.parse(localStorage.getItem('fuguang_theme') || '"dark"');
        } catch (error) {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-page home-page">
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">浮</span>
                <span class="logo-copy">
                    <strong>浮光</strong>
                    <em>CINEMA INDEX</em>
                </span>
            </a>
            <div class="header-right">
                <div class="source-selector">
                    <label for="sourceSelector">片源</label>
                    <select id="sourceSelector"></select>
                </div>
                <div class="search-box cinematic-search">
                    <input type="text" id="searchInput" placeholder="搜索影片 / 剧集 / 关键词">
                    <button type="button" class="search-clear-btn" id="searchClearButton" aria-label="清除搜索内容" title="清除" hidden>×</button>
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <a href="music.html" class="settings-btn music-entry-btn">音乐库</a>
                <a href="settings.html" class="settings-btn" onclick="return AccessGuard.openSettingsPage(event)">片源管理</a>
            </div>
        </div>
    </header>

    <main class="main-shell">
        <section class="hero-band">
            <div class="hero-band-inner hero-layout">
                <section class="hero-feature panel-card" id="heroShowcase">
                    <div class="hero-fallback">
                        <p class="eyebrow">浮光片库</p>
                        <h1>正在为你编排今夜片单</h1>
                        <p>切换片源、搜索片名，或从下方分类频道里直接进入。</p>
                    </div>
                </section>
                <aside class="hero-sidebar panel-card">
                    <div class="section-heading compact">
                        <div>
                            <p class="eyebrow">今日焦点</p>
                        </div>
                        <span class="section-caption" id="heroSourceLabel">片源待命</span>
                    </div>
                    <div class="hero-sidebar-list" id="heroSide"></div>
                </aside>
            </div>
        </section>

        <section class="container panel-card discovery-panel">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">片库导航</p>
                    <h2 id="sectionTitle" hidden>最新影视</h2>
                    <p class="section-caption" id="sectionMeta">正在载入当前片源的影片目录。</p>
                </div>
                <div class="section-tools" id="sourceSummary"></div>
            </div>

            <nav class="category-nav cinematic-tabs" id="categoryNav">
                <button class="category-btn active" data-id="0" onclick="selectCategory(0)">全部</button>
            </nav>

            <div class="filter-strip" id="statusFilterBar"></div>
        </section>

        <section class="container panel-card">
            <div class="section-heading compact">
                <div>
                    <p class="eyebrow">精选片单</p>
                </div>
                <span class="section-caption" id="resultsMeta">正在更新推荐条目</span>
            </div>
            <div class="featured-strip" id="featuredStrip"></div>
        </section>

        <section class="container panel-card catalog-panel">
            <div class="section-heading compact">
                <div>
                    <p class="eyebrow">片库瀑布</p>
                </div>
                <span class="section-caption" id="catalogHint">按分类、状态和关键词组合筛选当前片单。</span>
            </div>
            <div class="video-grid" id="videoGrid"></div>
            <div class="pagination" id="pagination"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <p>浮光聚合的影视资源均来自公开网络接口，仅供学习与界面体验使用。</p>
            <p>建议优先使用可播放的 M3U8 线路，若无结果可切换数据源重新检索。</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let currentCategory = 0;
        let currentPage = 1;
        let currentSource = null;
        let categories = [];
        let currentVideos = [];
        let currentStatusFilter = 'all';
        let currentSearchKeyword = '';
        let currentSourceKind = 'vod';
        let isAggregateSearch = false;
        let aggregateSearchStats = null;
        let spotlightVideos = [];
        let spotlightSourceKind = 'vod';
        let pageInfo = { total: 0, pagecount: 1 };
        let featuredSeedVideos = [];
        const FEATURED_COUNT = 6;

        const FILTER_CONFIG = {
            vod: [
                { key: 'all', label: '全部片单', description: '当前页全部内容' },
                { key: 'recent', label: '最近更新', description: '近 10 天更新' },
                { key: 'serial', label: '连载中', description: '识别为更新中' },
                { key: 'complete', label: '已完结', description: '识别为全集/完结' },
                { key: 'hd', label: '高清', description: '带清晰度标识' },
                { key: 'm3u8', label: 'M3U8', description: '优先可播线路' }
            ],
            art: [
                { key: 'all', label: '全部资讯', description: '当前页全部内容' },
                { key: 'recent', label: '最近更新', description: '按时间筛选最新内容' },
                { key: 'cover', label: '有封面', description: '带图片封面的资讯条目' },
                { key: 'summary', label: '有摘要', description: '带摘要或正文简介' },
                { key: 'source', label: '有来源', description: '带作者或来源信息' }
            ],
            mixed: [
                { key: 'all', label: '全部结果', description: '聚合后的全部结果' },
                { key: 'recent', label: '最近更新', description: '按时间筛选最新内容' },
                { key: 'vod', label: '影视', description: '仅看可播放影视内容' },
                { key: 'art', label: '资讯', description: '仅看资讯阅读内容' },
                { key: 'm3u8', label: 'M3U8', description: '优先显示可播影视源' },
                { key: 'cover', label: '有封面', description: '保留带封面的内容' }
            ]
        };

        function getStatusFilters() {
            return FILTER_CONFIG[currentSourceKind] || FILTER_CONFIG.vod;
        }

        function getContentCopy() {
            return currentSourceKind === 'art'
                ? {
                    noun: '资讯',
                    plural: '资讯',
                    heroEyebrow: '浮光资讯精选',
                    heroAction: '阅读全文',
                    heroBrowse: '继续浏览',
                    empty: '没有匹配的资讯',
                    failure: '资讯加载失败',
                    searchLoading: '正在搜索资讯库...',
                    sourceLabel: '资讯源'
                }
                : currentSourceKind === 'mixed'
                    ? {
                        noun: '结果',
                        plural: '结果',
                        heroEyebrow: '浮光全片源搜索',
                        heroAction: '查看详情',
                        heroBrowse: '继续浏览',
                        empty: '没有匹配的聚合结果',
                        failure: '全片源搜索失败',
                        searchLoading: '正在搜索全部片源...',
                        sourceLabel: '聚合搜索'
                    }
                    : {
                    noun: '影片',
                    plural: '片单',
                    heroEyebrow: '浮光片库精选',
                    heroAction: '查看详情',
                    heroBrowse: '继续翻片',
                    empty: '没有匹配的影片',
                    failure: '片库加载失败',
                    searchLoading: '正在搜索片库...',
                    sourceLabel: '影视源'
                };
        }

        async function init() {
            currentSource = SourceManager.getCurrentSource();

            const pageFromUrl = getUrlParam('page');
            const categoryFromUrl = getUrlParam('category');
            const searchFromUrl = getUrlParam('wd');

            if (pageFromUrl) currentPage = parseInt(pageFromUrl, 10);
            if (categoryFromUrl) currentCategory = parseInt(categoryFromUrl, 10);
            if (searchFromUrl) currentSearchKeyword = searchFromUrl;

            await loadCategories();

            if (currentSearchKeyword) {
                document.getElementById('searchInput').value = currentSearchKeyword;
                updateSearchClearButton();
                await handleSearch();
            } else {
                updateSearchClearButton();
                updateSectionHeading();
                await loadVideos();
            }
        }

        async function reloadAll() {
            currentSource = SourceManager.getCurrentSource();
            if (isAggregateSearch && currentSearchKeyword) {
                await loadSpotlightContent();
                renderSourceSummary();
                updateSectionHeading(getVisibleVideos().length);
                return;
            }
            currentCategory = 0;
            currentPage = 1;
            currentStatusFilter = 'all';
            currentSearchKeyword = '';
            isAggregateSearch = false;
            aggregateSearchStats = null;
            currentVideos = [];
            categories = [];

            document.getElementById('searchInput').value = '';
            updateSearchClearButton();
            resetUrlState();
            await loadCategories();
            updateSectionHeading();
            await loadVideos();
        }

        function resetUrlState() {
            const url = new URL(window.location);
            url.searchParams.delete('category');
            url.searchParams.delete('page');
            url.searchParams.delete('wd');
            history.pushState({}, '', url);
        }

        async function loadCategories() {
            if (isAggregateSearch) {
                categories = [];
                renderCategories();
                renderStatusFilters();
                renderSourceSummary();
                return;
            }

            try {
                const data = await loadSpotlightDataset();
                currentSourceKind = data.source_kind;
                categories = data.class || [];
                setSpotlightContent(data.list || [], data.source_kind);
            } catch (error) {
                console.error('加载分类失败:', error);
                currentSourceKind = DataAdapter.detectSourceKind(null, currentSource);
                categories = [];
                setSpotlightContent([], currentSourceKind);
            }

            renderCategories();
            renderStatusFilters();
            renderSourceSummary();
        }

        async function loadSpotlightDataset(minimumCount = 5, maxPages = 6) {
            const firstPage = DataAdapter.normalizeResponse(await Api.getVideoList(currentSource, { pg: 1 }), currentSource);
            const combined = Array.isArray(firstPage.list) ? [...firstPage.list] : [];
            let deduped = dedupeSingleSourceItems(combined);

            for (let page = 2; page <= maxPages && deduped.length < minimumCount; page += 1) {
                const nextPage = DataAdapter.normalizeResponse(await Api.getVideoList(currentSource, { pg: page }), currentSource);
                if (!Array.isArray(nextPage.list) || nextPage.list.length === 0) {
                    break;
                }

                combined.push(...nextPage.list);
                deduped = dedupeSingleSourceItems(combined);
            }

            return {
                ...firstPage,
                list: deduped
            };
        }

        async function loadCatalogDataset() {
            const fetchPageData = async (page) => {
                return currentCategory > 0
                    ? DataAdapter.normalizeResponse(await Api.getVideosByCategory(currentSource, currentCategory, page), currentSource)
                    : DataAdapter.normalizeResponse(await Api.getVideoList(currentSource, { pg: page }), currentSource);
            };

            const firstPage = await fetchPageData(1);
            const pageSize = parseInt(firstPage.limit, 10) || firstPage.list?.length || 20;
            const maxPages = parseInt(firstPage.pagecount, 10) || 1;
            const catalogStart = FEATURED_COUNT + ((Math.max(1, currentPage) - 1) * pageSize);
            const catalogEnd = catalogStart + pageSize;
            const combined = Array.isArray(firstPage.list) ? [...firstPage.list] : [];
            let deduped = dedupeSingleSourceItems(combined);

            for (let page = 2; page <= maxPages && deduped.length < catalogEnd; page += 1) {
                const nextPage = await fetchPageData(page);
                if (!Array.isArray(nextPage.list) || nextPage.list.length === 0) {
                    break;
                }

                combined.push(...nextPage.list);
                deduped = dedupeSingleSourceItems(combined);
            }

            return {
                ...firstPage,
                list: deduped.slice(catalogStart, catalogEnd),
                featured_list: deduped.slice(0, pageSize),
                total: Math.max((parseInt(firstPage.total, 10) || deduped.length) - FEATURED_COUNT, 0),
                pagecount: Math.max(1, Math.ceil(Math.max((parseInt(firstPage.total, 10) || deduped.length) - FEATURED_COUNT, 0) / pageSize)),
                limit: pageSize,
                page: currentPage
            };
        }

        async function loadSpotlightContent() {
            try {
                const data = await loadSpotlightDataset();
                setSpotlightContent(data.list || [], data.source_kind);
            } catch (error) {
                console.error('加载首屏推荐失败:', error);
                setSpotlightContent([], DataAdapter.detectSourceKind(null, currentSource));
            }
        }

        function setSpotlightContent(videos, kind) {
            spotlightVideos = videos;
            spotlightSourceKind = kind || currentSourceKind;
            renderHeroArea();
            loadHeroPosterAssets(spotlightVideos);
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            if (isAggregateSearch) {
                nav.innerHTML = `
                    <button class="category-btn active" type="button">全片源聚合结果</button>
                    <button class="category-btn" type="button" disabled>分类筛选在聚合搜索中已关闭</button>
                `;
                return;
            }

            const allLabel = currentSourceKind === 'art' ? '全部资讯' : '全部';
            const allButton = `<button class="category-btn ${currentCategory === 0 ? 'active' : ''}" data-id="0" onclick="selectCategory(0)">${allLabel}</button>`;
            const categoryButtons = categories.map(category => `
                <button class="category-btn ${currentCategory === category.type_id ? 'active' : ''}" data-id="${category.type_id}" onclick="selectCategory(${category.type_id})">
                    ${escapeHtml(category.type_name)}
                </button>
            `).join('');
            nav.innerHTML = allButton + categoryButtons;
        }

        function renderStatusFilters() {
            const statusFilters = getStatusFilters();
            if (!statusFilters.some(filter => filter.key === currentStatusFilter)) {
                currentStatusFilter = 'all';
            }

            const countVideosByFilter = (filterKey) => {
                const featuredCount = getFeaturedVideosForFilter(filterKey).length;
                const catalogCount = getCatalogVideosForFilter(filterKey).length;
                return featuredCount + catalogCount;
            };

            const filteredCounts = statusFilters.map(filter => ({
                ...filter,
                count: countVideosByFilter(filter.key)
            }));

            document.getElementById('statusFilterBar').innerHTML = filteredCounts.map(filter => `
                <button class="filter-chip ${currentStatusFilter === filter.key ? 'active' : ''}" onclick="selectStatusFilter('${filter.key}')">
                    <span>${escapeHtml(filter.label)}</span>
                    <em>${filter.count}</em>
                </button>
            `).join('');
        }

        function renderSourceSummary() {
            const source = currentSource || SourceManager.getCurrentSource();
            const summary = isAggregateSearch
                ? [
                    { label: '默认浏览片源', value: source?.name || '未选择' },
                    { label: '搜索范围', value: `全部 ${aggregateSearchStats?.totalSources || SourceManager.getSources().length} 个片源` },
                    { label: '成功片源', value: `${aggregateSearchStats?.successCount || 0} 个` },
                    { label: '失败片源', value: `${aggregateSearchStats?.failureCount || 0} 个` }
                ]
                : [
                    { label: '当前片源', value: source?.name || '未选择' },
                    { label: '识别类型', value: DataAdapter.getKindLabel(currentSourceKind) },
                    { label: '分类频道', value: categories.length > 0 ? `${categories.length} 个` : '等待载入' },
                    { label: '筛选状态', value: getStatusFilters().find(filter => filter.key === currentStatusFilter)?.label || '全部内容' }
                ];

            document.getElementById('sourceSummary').innerHTML = summary.map(item => `
                <div class="summary-chip">
                    <span>${escapeHtml(item.label)}</span>
                    <strong>${escapeHtml(item.value)}</strong>
                </div>
            `).join('');

            document.getElementById('heroSourceLabel').textContent = isAggregateSearch
                ? `全片源搜索 · ${aggregateSearchStats?.successCount || 0} / ${aggregateSearchStats?.totalSources || SourceManager.getSources().length} 个片源已返回`
                : (source?.name
                    ? `${source.name} · ${DataAdapter.getKindLabel(currentSourceKind)}`
                    : '片源待命');
        }

        function selectStatusFilter(filterKey) {
            currentStatusFilter = filterKey;
            renderStatusFilters();
            renderSourceSummary();
            renderCurrentView();
        }

        function selectCategory(categoryId) {
            if (isAggregateSearch) {
                return;
            }

            currentCategory = categoryId;
            currentPage = 1;
            currentStatusFilter = 'all';
            currentSearchKeyword = '';
            document.getElementById('searchInput').value = '';
            updateSearchClearButton();

            renderCategories();
            updateSectionHeading();

            const url = new URL(window.location);
            url.searchParams.set('category', categoryId);
            url.searchParams.set('page', 1);
            url.searchParams.delete('wd');
            history.pushState({}, '', url);

            loadVideos();
        }

        async function loadVideos() {
            isAggregateSearch = false;
            aggregateSearchStats = null;
            UI.showLoading(document.getElementById('videoGrid'));

            try {
                const data = await loadCatalogDataset();

                currentSourceKind = data.source_kind;
                currentVideos = data.list || [];
                featuredSeedVideos = data.featured_list || [];
                pageInfo = {
                    total: parseInt(data.total, 10) || currentVideos.length,
                    pagecount: parseInt(data.pagecount, 10) || 1
                };

                renderStatusFilters();
                renderSourceSummary();
                renderCurrentView();

                UI.renderPagination(parseInt(data.page, 10) || currentPage, pageInfo.pagecount);
                loadPosterAssets(currentVideos, featuredSeedVideos);
            } catch (error) {
                console.error('加载视频列表失败:', error);
                currentVideos = [];
                featuredSeedVideos = [];
                UI.showError(document.getElementById('videoGrid'), '加载失败，请检查数据源配置');
                document.getElementById('featuredStrip').innerHTML = '';
                document.getElementById('resultsMeta').textContent = '当前没有可展示的精选内容';
                document.getElementById('pagination').innerHTML = '';
            }
        }

        function getVisibleVideos() {
            return currentVideos.filter(video => VideoMeta.matchesFilter(video, currentStatusFilter));
        }

        function getFeaturedVideosForFilter(filterKey = 'all') {
            if (isAggregateSearch) {
                const filteredAggregate = currentVideos.filter(video => VideoMeta.matchesFilter(video, filterKey));
                return getFeaturedVideos(filteredAggregate, FEATURED_COUNT);
            }

            const filteredFeaturedSeed = featuredSeedVideos.filter(video => VideoMeta.matchesFilter(video, filterKey));
            return getFeaturedVideos(filteredFeaturedSeed, FEATURED_COUNT);
        }

        function getCatalogVideosForFilter(filterKey = 'all') {
            if (isAggregateSearch) {
                const filteredAggregate = currentVideos.filter(video => VideoMeta.matchesFilter(video, filterKey));
                const featuredVideos = getFeaturedVideos(filteredAggregate, FEATURED_COUNT);
                return getCatalogVideos(filteredAggregate, featuredVideos.length);
            }

            return currentVideos.filter(video => VideoMeta.matchesFilter(video, filterKey));
        }

        function renderCurrentView() {
            const featuredVideos = getFeaturedVideosForFilter(currentStatusFilter);
            const catalogVideos = getCatalogVideosForFilter(currentStatusFilter);
            const visibleCount = featuredVideos.length + catalogVideos.length;

            updateSectionHeading(visibleCount);
            renderFeaturedStrip(featuredVideos);

            if (visibleCount === 0) {
                UI.showEmpty(document.getElementById('videoGrid'), getContentCopy().empty, '可以切换状态标签、分类或数据源继续浏览。');
                document.getElementById('catalogHint').textContent = '当前筛选条件下无匹配条目';
                return;
            }

            if (catalogVideos.length > 0) {
                renderVideoList(catalogVideos);
                document.getElementById('catalogHint').textContent = isAggregateSearch
                    ? `当前为全片源搜索结果，前 ${featuredVideos.length} 条已在上方精选展示，瀑布区展示其余 ${catalogVideos.length} 条`
                    : `前 ${featuredVideos.length} 条已在上方精选展示，瀑布区当前页展示 ${catalogVideos.length} 条`;
                return;
            }

            UI.showEmpty(document.getElementById('videoGrid'), '当前页内容已展示完毕', '当前页内容已在上方精选片单展示完毕。');
            document.getElementById('catalogHint').textContent = '当前页内容已在上方精选片单展示完毕';
        }

        function renderHeroArea() {
            if (spotlightVideos.length > 0) {
                renderHeroShowcase(spotlightVideos, spotlightSourceKind);
                return;
            }

            renderHeroFallback('片库精选暂未就绪', '正在等待当前片源的首页推荐内容返回。');
        }

        function renderHeroFallback(title, description) {
            document.getElementById('heroShowcase').classList.remove('is-stack-mode');
            document.getElementById('heroShowcase').innerHTML = `
                <div class="hero-fallback">
                    <p class="eyebrow">${escapeHtml(
                        spotlightSourceKind === 'art'
                            ? '浮光资讯'
                            : (spotlightSourceKind === 'mixed' ? '浮光搜索' : '浮光片库')
                    )}</p>
                    <h1>${escapeHtml(title)}</h1>
                    <p>${escapeHtml(description)}</p>
                </div>
            `;
            document.getElementById('heroSide').innerHTML = '';
        }

        function renderHeroShowcase(videos, kind = currentSourceKind) {
            const HERO_STACK_MAX_ITEMS = 6;
            const copy = kind === 'art'
                ? { heroEyebrow: '浮光资讯精选', heroAction: '阅读全文', heroBrowse: '继续浏览' }
                : { heroEyebrow: '浮光片库精选', heroAction: '查看详情', heroBrowse: '继续翻片' };
            const showcaseVideos = videos.slice(0, HERO_STACK_MAX_ITEMS);
            const primaryVideo = showcaseVideos[0];
            const badges = VideoMeta.getStatusBadges(primaryVideo).map(item => UI.renderBadge(item.label, item.tone)).join('');
            const sideFallbackVideos = videos.slice(1, 5);
            const secondaryVideos = videos.slice(HERO_STACK_MAX_ITEMS, HERO_STACK_MAX_ITEMS + 4).length > 0
                ? videos.slice(HERO_STACK_MAX_ITEMS, HERO_STACK_MAX_ITEMS + 4)
                : sideFallbackVideos;
            const stackCardWidth = showcaseVideos.length >= 6 ? 25 : 30;
            const stackStep = showcaseVideos.length > 1
                ? Number(((100 - stackCardWidth) / (showcaseVideos.length - 1)).toFixed(4))
                : 0;

            if (showcaseVideos.length >= 5) {
                document.getElementById('heroShowcase').classList.add('is-stack-mode');
                document.getElementById('heroShowcase').innerHTML = `
                    <div class="hero-stack-shell">
                        <div class="hero-stack-head">
                            <p class="eyebrow">${escapeHtml(copy.heroEyebrow)}</p>
                        </div>
                        <div class="hero-stack-wall" style="--hero-stack-width:${stackCardWidth}%; --hero-stack-step:${stackStep}%;">
                            ${showcaseVideos.map((video, index) => {
                                const stackBadges = VideoMeta.getStatusBadges(video).slice(0, 2).map(item => UI.renderBadge(item.label, item.tone)).join('');
                                const sourceLabel = video.source_name || video.type_name || DataAdapter.getKindLabel(video.source_kind || video.kind);
                                return `
                                    <article class="hero-stack-card" style="--hero-stack-index:${index};" onclick="goToDetail(${video.vod_id}, ${video.source_id || 'null'})">
                                        <div class="hero-stack-poster">
                                            ${UI.renderPosterPlaceholder(`hero-stack-${video.vod_id}`, '浮光')}
                                            <div class="hero-stack-overlay" aria-hidden="true"></div>
                                        </div>
                                        <div class="hero-stack-copy">
                                            <div class="hero-badges">${stackBadges}</div>
                                            <span class="hero-stack-summary">${escapeHtml(VideoMeta.getSearchSummary(video) || '浮光片库')}</span>
                                            <h3>${escapeHtml(video.vod_name || '浮光推荐')}</h3>
                                            <p>${escapeHtml(VideoMeta.getDescription(video))}</p>
                                            <div class="hero-stack-meta">
                                                <span>${escapeHtml(sourceLabel)}</span>
                                                <em>${escapeHtml(VideoMeta.formatTime(video.vod_time) || '浮光片库')}</em>
                                            </div>
                                        </div>
                                    </article>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            } else {
                document.getElementById('heroShowcase').classList.remove('is-stack-mode');
                const thirdMeta = kind === 'art'
                    ? (primaryVideo.art_author || primaryVideo.art_from || '资讯内容')
                    : VideoMeta.getPrimarySourceLabel(primaryVideo);

                document.getElementById('heroShowcase').innerHTML = `
                    <div class="hero-copy">
                        <p class="eyebrow">${escapeHtml(copy.heroEyebrow)}</p>
                        <div class="hero-badges">${badges}</div>
                        <h1>${escapeHtml(primaryVideo.vod_name || '浮光推荐')}</h1>
                        <p class="hero-description">${escapeHtml(VideoMeta.getDescription(primaryVideo))}</p>
                        <div class="hero-meta-line">
                            <span>${escapeHtml(primaryVideo.type_name || '未分类')}</span>
                            <span>${escapeHtml(VideoMeta.formatTime(primaryVideo.vod_time))}</span>
                            <span>${escapeHtml(primaryVideo.source_name || thirdMeta)}</span>
                        </div>
                        <div class="hero-actions">
                            <a class="btn-primary" href="${escapeHtml(getDetailUrl(primaryVideo.vod_id, primaryVideo.source_id))}">${escapeHtml(copy.heroAction)}</a>
                            <button class="btn-secondary" onclick="scrollToCatalog()">${escapeHtml(copy.heroBrowse)}</button>
                        </div>
                    </div>
                    <div class="hero-poster-frame">
                        ${UI.renderPosterPlaceholder(`hero-poster-${primaryVideo.vod_id}`, '浮光')}
                    </div>
                `;
            }

            document.getElementById('heroSide').innerHTML = secondaryVideos.map(video => `
                <article class="hero-mini-card" onclick="goToDetail(${video.vod_id}, ${video.source_id || 'null'})">
                    <div class="hero-mini-poster">
                        ${UI.renderPosterPlaceholder(`hero-mini-${video.vod_id}`, '片单')}
                    </div>
                    <div class="hero-mini-copy">
                        <strong>${escapeHtml(video.vod_name || '片单条目')}</strong>
                        <span>${escapeHtml(video.source_name || video.type_name || '未分类')}</span>
                        <em>${escapeHtml(kind === 'art' ? VideoMeta.formatTime(video.vod_time) : VideoMeta.getDescription(video))}</em>
                    </div>
                </article>
            `).join('');
        }

        function getFeaturedVideos(videos, minimumCount = FEATURED_COUNT) {
            const primaryList = Array.isArray(videos) ? videos : [];
            return primaryList.slice(0, minimumCount);
        }

        function getCatalogVideos(videos, featuredCount = FEATURED_COUNT) {
            const primaryList = Array.isArray(videos) ? videos : [];
            return primaryList.slice(Math.max(0, featuredCount));
        }

        function renderFeaturedStrip(videos) {
            const featuredVideos = getFeaturedVideos(videos, 6);
            document.getElementById('featuredStrip').innerHTML = featuredVideos.map(video => `
                <article class="featured-tile" onclick="goToDetail(${video.vod_id}, ${video.source_id || 'null'})">
                    <div class="featured-poster">
                        ${UI.renderPosterPlaceholder(`featured-${video.vod_id}`, '浮光')}
                    </div>
                    <div class="featured-copy">
                        <div class="featured-badges">
                            ${VideoMeta.getStatusBadges(video).slice(0, 2).map(item => UI.renderBadge(item.label, item.tone)).join('')}
                        </div>
                        <h3>${escapeHtml(video.vod_name || '片单条目')}</h3>
                        <p>${escapeHtml(VideoMeta.getSearchSummary(video))}</p>
                        ${isAggregateSearch && video.source_name ? `<span class="featured-source">${escapeHtml(video.source_name)}</span>` : ''}
                    </div>
                </article>
            `).join('');

            const resultsMeta = document.getElementById('resultsMeta');
            const nextMetaText = isAggregateSearch
                ? `共搜索 ${aggregateSearchStats?.totalSources || 0} 个片源，成功 ${aggregateSearchStats?.successCount || 0} 个，聚合后 ${getVisibleVideos().length} 条`
                : '';
            resultsMeta.textContent = nextMetaText;
            resultsMeta.hidden = !nextMetaText;
        }

        function renderVideoList(videos) {
            document.getElementById('videoGrid').innerHTML = videos.map(video => UI.renderVideoCard(video)).join('');
        }

        function loadHeroPosterAssets(videos) {
            const heroItems = videos.slice(0, 10);
            heroItems.forEach(video => {
                const source = SourceManager.getSourceById(video.source_id) || currentSource;
                UI.loadPosterAsync(video.vod_id, source, `hero-poster-${video.vod_id}`, video.vod_name);
                UI.loadPosterAsync(video.vod_id, source, `hero-stack-${video.vod_id}`, video.vod_name);
                UI.loadPosterAsync(video.vod_id, source, `hero-mini-${video.vod_id}`, video.vod_name);
            });
        }

        function loadPosterAssets(videos, featuredVideos = null) {
            const featuredItems = Array.isArray(featuredVideos) ? featuredVideos.slice(0, FEATURED_COUNT) : videos.slice(0, FEATURED_COUNT);
            featuredItems.forEach(video => {
                const source = SourceManager.getSourceById(video.source_id) || currentSource;
                UI.loadPosterAsync(video.vod_id, source, `featured-${video.vod_id}`, video.vod_name);
            });

            videos.forEach(video => {
                const source = SourceManager.getSourceById(video.source_id) || currentSource;
                UI.loadPosterAsync(video.vod_id, source, `poster-${video.vod_id}`, video.vod_name);
            });
        }

        function updateSectionHeading(visibleCount = currentVideos.length) {
            if (isAggregateSearch) {
                const summaryParts = [
                    '全片源搜索',
                    `${aggregateSearchStats?.successCount || 0}/${aggregateSearchStats?.totalSources || 0} 个片源成功`,
                    aggregateSearchStats?.failureCount ? `${aggregateSearchStats.failureCount} 个片源失败` : '全部片源返回完成',
                    visibleCount ? `${visibleCount} 条聚合结果` : '暂无匹配结果'
                ];

                document.getElementById('sectionTitle').textContent = currentSearchKeyword ? `搜索：${currentSearchKeyword}` : '全片源搜索';
                document.getElementById('sectionMeta').textContent = summaryParts.join(' · ');
                return;
            }

            const categoryName = currentCategory === 0
                ? (currentSourceKind === 'art' ? '最新资讯' : '最新影视')
                : (categories.find(category => category.type_id === currentCategory)?.type_name || (currentSourceKind === 'art' ? '资讯列表' : '影视列表'));

            const title = currentSearchKeyword ? `搜索：${currentSearchKeyword}` : categoryName;
            const summaryParts = [
                currentSource?.name || '默认片源',
                DataAdapter.getKindLabel(currentSourceKind),
                currentSearchKeyword ? '搜索模式' : '频道浏览',
                `第 ${currentPage} 页`,
                visibleCount ? `${visibleCount} 条当前结果` : '等待片单'
            ];

            document.getElementById('sectionTitle').textContent = title;
            document.getElementById('sectionMeta').textContent = summaryParts.join(' · ');
        }

        function scrollToCatalog() {
            document.querySelector('.catalog-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function scrollToSearchResults() {
            const target = document.querySelector('.discovery-panel');
            if (!target) {
                return;
            }

            requestAnimationFrame(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }

        function updateSearchClearButton() {
            const searchInput = document.getElementById('searchInput');
            const searchClearButton = document.getElementById('searchClearButton');
            if (!searchInput || !searchClearButton) {
                return;
            }

            searchClearButton.hidden = !searchInput.value.trim();
        }

        function syncSearchClearButtonSoon() {
            window.setTimeout(() => {
                updateSearchClearButton();
            }, 0);
        }

        async function handleSearch(updateHistory = true) {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                currentSearchKeyword = '';
                isAggregateSearch = false;
                aggregateSearchStats = null;
                const url = new URL(window.location);
                url.searchParams.delete('wd');
                if (updateHistory) {
                    history.pushState({}, '', url);
                }
                await loadCategories();
                updateSectionHeading();
                await loadVideos();
                return;
            }

            currentCategory = 0;
            currentPage = 1;
            currentStatusFilter = 'all';
            currentSearchKeyword = keyword;
            isAggregateSearch = true;
            currentSourceKind = 'mixed';
            categories = [];
            renderCategories();
            renderStatusFilters();
            UI.showLoading(document.getElementById('videoGrid'), getContentCopy().searchLoading);

            try {
                const searchResult = await SearchAggregator.searchAll(keyword, SourceManager.getSources());
                currentSourceKind = searchResult.kind;
                currentVideos = searchResult.items || [];
                aggregateSearchStats = searchResult;
                pageInfo = { total: currentVideos.length, pagecount: 1 };

                const url = new URL(window.location);
                url.searchParams.set('wd', keyword);
                url.searchParams.delete('category');
                url.searchParams.delete('page');
                if (updateHistory) {
                    history.pushState({}, '', url);
                }

                renderCategories();
                renderStatusFilters();
                renderSourceSummary();
                renderCurrentView();
                document.getElementById('pagination').innerHTML = '';
                loadPosterAssets(currentVideos, currentVideos);
                scrollToSearchResults();

                if (aggregateSearchStats.successCount === 0) {
                    throw new Error('全部片源搜索失败');
                }
            } catch (error) {
                console.error('搜索失败:', error);
                aggregateSearchStats = aggregateSearchStats || {
                    totalSources: SourceManager.getSources().length,
                    successCount: 0,
                    failureCount: SourceManager.getSources().length
                };
                currentVideos = [];
                updateSectionHeading(0);
                UI.showError(document.getElementById('videoGrid'), '搜索失败，请重试');
                document.getElementById('featuredStrip').innerHTML = '';
                renderSourceSummary();
                scrollToSearchResults();
            }
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            updateSearchClearButton();
        });

        document.getElementById('searchInput').addEventListener('change', function() {
            updateSearchClearButton();
        });

        document.getElementById('searchInput').addEventListener('focus', function() {
            syncSearchClearButtonSoon();
        });

        document.getElementById('searchInput').addEventListener('animationstart', function(event) {
            if (event.animationName === 'search-autofill-sync') {
                syncSearchClearButtonSoon();
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                handleSearch();
            }
        });

        document.getElementById('searchClearButton').addEventListener('click', function() {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            updateSearchClearButton();
            searchInput.focus();
        });

        window.addEventListener('popstate', function() {
            const pageFromUrl = getUrlParam('page');
            const categoryFromUrl = getUrlParam('category');
            const searchFromUrl = getUrlParam('wd');

            currentPage = pageFromUrl ? parseInt(pageFromUrl, 10) : 1;
            currentCategory = categoryFromUrl ? parseInt(categoryFromUrl, 10) : 0;
            currentSearchKeyword = searchFromUrl || '';
            currentStatusFilter = 'all';
            document.getElementById('searchInput').value = currentSearchKeyword;
            updateSearchClearButton();

            renderCategories();
            renderStatusFilters();

            if (currentSearchKeyword) {
                handleSearch(false);
            } else {
                updateSectionHeading();
                loadVideos();
            }
        });

        updateSearchClearButton();
        syncSearchClearButtonSoon();
        init();
    </script>
</body>
</html>
