<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放中 - 浮光</title>
    <script>
        try {
            document.documentElement.dataset.theme = JSON.parse(localStorage.getItem('fuguang_theme') || '"dark"');
        } catch (error) {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="vendor/hls.min.js"></script>
</head>
<body class="site-page player-page">
    <header class="header player-header-shell">
        <div class="container header-inner">
            <button class="settings-btn ghost-btn" onclick="goBack()">返回详情</button>
            <a href="index.html" class="logo">
                <span class="logo-mark">浮</span>
                <span class="logo-copy">
                    <strong>浮光</strong>
                    <em>NOW PLAYING</em>
                </span>
            </a>
            <div class="header-right">
                <div class="source-selector">
                    <label for="sourceSelector">片源</label>
                    <select id="sourceSelector"></select>
                </div>
            </div>
        </div>
    </header>

    <main class="main-shell player-shell">
        <section class="container player-stage-grid">
            <div class="panel-card player-stage-card">
                <div class="video-wrapper" id="videoWrapper">
                    <video id="videoPlayer" controls playsinline></video>
                    <div class="player-loading" id="playerLoading">
                        <div class="loading-spinner"></div>
                        <p>正在准备播放线路...</p>
                    </div>
                </div>
            </div>

            <aside class="panel-card player-info-card">
                <p class="eyebrow">正在放映</p>
                <h1 class="player-title" id="playerTitle">载入中...</h1>
                <p class="player-episode-name" id="episodeName">正在连接片源</p>
                <div class="player-detail-stack" id="playerMeta"></div>
                <div class="player-actions">
                    <a class="btn-primary" id="detailLink" href="index.html">查看详情</a>
                    <a class="btn-secondary" href="index.html">回到首页</a>
                </div>
            </aside>
        </section>

        <section class="container panel-card player-control-panel">
            <div class="section-heading compact">
                <div>
                    <p class="eyebrow">切换线路</p>
                    <h2>播放控制台</h2>
                </div>
                <span class="section-caption" id="playerSourceSummary">正在识别可播线路</span>
            </div>
            <div class="player-source-tabs" id="sourceTabs"></div>
            <div class="player-episode-list" id="episodeList"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        let playerMode = 'vod';
        let videoId = null;
        let episodeIndex = 0;
        let sourceIndex = 0;
        let currentSource = null;
        let videoData = null;
        let playSources = [];
        let hls = null;
        let currentContentKind = 'vod';
        let playRequestId = 0;
        let video = null;
        let loadingEl = null;

        function getPlayerMarkup() {
            return `
                <video id="videoPlayer" controls playsinline></video>
                <div class="player-loading" id="playerLoading">
                    <div class="loading-spinner"></div>
                    <p>正在准备播放线路...</p>
                </div>
            `;
        }

        function bindVideoEvents(targetVideo) {
            if (!targetVideo || targetVideo.dataset.bound === '1') {
                return;
            }

            targetVideo.addEventListener('ended', function() {
                const currentPlaySource = playSources[sourceIndex];
                if (currentPlaySource && episodeIndex < currentPlaySource.episodes.length - 1) {
                    switchEpisode(episodeIndex + 1);
                }
            });

            targetVideo.addEventListener('canplay', function() {
                showLoading(false);
            });

            targetVideo.dataset.bound = '1';
        }

        function ensurePlayerElements() {
            const wrapper = document.getElementById('videoWrapper');
            let nextVideo = document.getElementById('videoPlayer');
            let nextLoading = document.getElementById('playerLoading');

            if (!nextVideo || !nextLoading) {
                wrapper.innerHTML = getPlayerMarkup();
                nextVideo = document.getElementById('videoPlayer');
                nextLoading = document.getElementById('playerLoading');
            }

            bindVideoEvents(nextVideo);
            video = nextVideo;
            loadingEl = nextLoading;
        }

        function showLoading(show, message = '正在准备播放线路...') {
            ensurePlayerElements();
            loadingEl.querySelector('p').textContent = message;
            loadingEl.style.display = show ? 'flex' : 'none';
        }

        async function init() {
            playerMode = getUrlParam('mode') || 'vod';
            if (playerMode === 'iptv') {
                initIptvMode();
                return;
            }

            videoId = getUrlParam('id');
            episodeIndex = parseInt(getUrlParam('ep'), 10) || 0;
            sourceIndex = parseInt(getUrlParam('source'), 10) || 0;

            if (!videoId) {
                showError('缺少视频ID');
                return;
            }

            currentSource = SourceManager.getSourceById(getUrlParam('source_id')) || SourceManager.getCurrentSource();
            document.getElementById('detailLink').href = getDetailUrl(videoId, currentSource?.id);
            showLoading(true);

            try {
                await loadVideoDetail();
            } catch (error) {
                console.error('初始化失败:', error);
                showError(`加载失败：${error.message}`);
            }
        }

        function initIptvMode() {
            const channelName = getUrlParam('name') || '未命名频道';
            const groupTitle = getUrlParam('group') || '未分组';
            const sourceName = getUrlParam('source_name') || 'IPTV 源';
            const playUrl = getUrlParam('play_url') || '';
            document.body.classList.add('iptv-player-mode');

            const controlPanel = document.querySelector('.player-control-panel');
            if (controlPanel) {
                controlPanel.hidden = true;
            }

            const sourceSelector = document.getElementById('sourceSelector');
            const sourceSelectorShell = sourceSelector?.closest('.source-selector');
            if (sourceSelector) {
                sourceSelector.id = 'disabledSourceSelector';
            }
            if (sourceSelectorShell) {
                sourceSelectorShell.hidden = true;
            }

            const backButton = document.querySelector('.player-header-shell .settings-btn.ghost-btn');
            if (backButton) {
                backButton.textContent = '返回 IPv6 库';
            }

            document.getElementById('detailLink').textContent = '回到 IPv6 库';
            document.getElementById('detailLink').href = 'ipv6.html';
            document.title = `${channelName} - 浮光`;
            document.getElementById('playerTitle').textContent = channelName;
            document.getElementById('episodeName').textContent = `${groupTitle} · ${sourceName}`;
            document.getElementById('playerMeta').innerHTML = `
                <div class="player-badges">
                    ${UI.renderBadge('IPTV 直播', 'accent')}
                    ${UI.renderBadge(groupTitle || '未分组', 'default')}
                    ${UI.renderBadge(sourceName || 'IPTV 源', 'default')}
                </div>
                <div class="player-meta-card">
                    <span>频道名称</span>
                    <strong>${escapeHtml(channelName)}</strong>
                </div>
                <div class="player-meta-card">
                    <span>频道分组</span>
                    <strong>${escapeHtml(groupTitle)}</strong>
                </div>
                <div class="player-meta-card">
                    <span>直播来源</span>
                    <strong>${escapeHtml(sourceName)}</strong>
                </div>
                <div class="player-meta-card">
                    <span>播放模式</span>
                    <strong>实时直播流</strong>
                </div>
            `;

            document.getElementById('playerSourceSummary').textContent = `当前直播频道 · ${sourceName}`;
            document.getElementById('sourceTabs').innerHTML = `
                <div class="episode-list-head">
                    <span>当前来源</span>
                    <strong>${escapeHtml(sourceName)} · ${escapeHtml(groupTitle)}</strong>
                </div>
            `;
            document.getElementById('episodeList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <h3>${escapeHtml(channelName)}</h3>
                    <p>当前为 IPTV 直播模式，已直接连接频道流，不提供影视剧集切换。</p>
                </div>
            `;

            if (!playUrl) {
                showError('缺少直播流地址');
                return;
            }

            playSources = [{
                name: sourceName,
                isM3u8: playUrl.includes('.m3u8') || playUrl.includes('m3u8'),
                episodes: [{
                    name: channelName,
                    url: playUrl
                }]
            }];
            sourceIndex = 0;
            episodeIndex = 0;
            playVideo(0, 0);
        }

        async function loadVideoDetail() {
            try {
                const data = DataAdapter.normalizeResponse(await Api.getVideoDetail(currentSource, videoId), currentSource);
                currentContentKind = data.source_kind;

                if (data.list && data.list.length > 0) {
                    videoData = data.list[0];
                    document.title = `${videoData.vod_name} - 浮光`;
                    document.getElementById('playerTitle').textContent = videoData.vod_name;
                    if (videoData.kind === 'art') {
                        renderArticleNotice();
                        return;
                    }
                    renderPlayerMeta();
                    parseAndSetupPlayer();
                } else {
                    showError(currentContentKind === 'art' ? '未找到该资讯' : '未找到该影视');
                }
            } catch (error) {
                console.error('加载详情失败:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function renderPlayerMeta() {
            const badges = VideoMeta.getStatusBadges(videoData).map(item => UI.renderBadge(item.label, item.tone)).join('');
            document.getElementById('playerMeta').innerHTML = `
                <div class="player-badges">${badges}</div>
                <div class="player-meta-card">
                    <span>分类</span>
                    <strong>${escapeHtml(videoData.type_name || '未分类')}</strong>
                </div>
                <div class="player-meta-card">
                    <span>更新时间</span>
                    <strong>${escapeHtml(VideoMeta.formatTime(videoData.vod_time))}</strong>
                </div>
                <div class="player-meta-card">
                    <span>导演 / 演员</span>
                    <strong>${escapeHtml(videoData.vod_director || videoData.vod_actor || '暂无资料')}</strong>
                </div>
                <div class="player-meta-card">
                    <span>剧情摘要</span>
                    <strong>${escapeHtml(VideoMeta.getDescription(videoData))}</strong>
                </div>
            `;
        }

        function renderArticleNotice() {
            showLoading(false);

            document.getElementById('episodeName').textContent = '当前片源为资讯内容，不提供播放线路';
            document.getElementById('playerMeta').innerHTML = `
                <div class="player-badges">
                    ${VideoMeta.getStatusBadges(videoData).map(item => UI.renderBadge(item.label, item.tone)).join('')}
                </div>
                <div class="player-meta-card">
                    <span>分类</span>
                    <strong>${escapeHtml(videoData.type_name || '未分类')}</strong>
                </div>
                <div class="player-meta-card">
                    <span>更新时间</span>
                    <strong>${escapeHtml(VideoMeta.formatTime(videoData.vod_time))}</strong>
                </div>
                <div class="player-meta-card">
                    <span>作者 / 来源</span>
                    <strong>${escapeHtml(videoData.art_author || videoData.art_from || '暂无资料')}</strong>
                </div>
                <div class="player-meta-card">
                    <span>内容摘要</span>
                    <strong>${escapeHtml(VideoMeta.getDescription(videoData))}</strong>
                </div>
            `;

            document.getElementById('videoWrapper').innerHTML = `
                <div class="player-error">
                    <div class="icon">📰</div>
                    <h3>资讯源不支持播放</h3>
                    <p>这个条目来自资讯接口，请返回详情页阅读正文内容。</p>
                    <div class="player-error-actions">
                        <button class="btn-primary" onclick="goBack()">前往详情阅读</button>
                        <a class="btn-secondary" href="index.html">回到首页</a>
                    </div>
                </div>
            `;

            document.getElementById('playerSourceSummary').textContent = '资讯源不提供播放线路';
            document.getElementById('sourceTabs').innerHTML = '';
            document.getElementById('episodeList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">📖</div>
                    <h3>阅读入口已准备好</h3>
                    <p>点击“前往详情阅读”即可查看完整正文。</p>
                </div>
            `;
        }

        function parseAndSetupPlayer() {
            if (!videoData.vod_play_from || !videoData.vod_play_url) {
                showError('暂无播放源');
                return;
            }

            playSources = VideoParser.sortSourcesByM3u8(VideoParser.parsePlaySources(videoData.vod_play_from, videoData.vod_play_url));
            if (playSources.length === 0) {
                showError('暂无播放源');
                return;
            }

            if (sourceIndex >= playSources.length) {
                sourceIndex = 0;
            }

            const source = playSources[sourceIndex];
            if (!source || !source.episodes || source.episodes.length === 0) {
                showError('播放源数据为空');
                return;
            }

            if (episodeIndex >= source.episodes.length) {
                episodeIndex = 0;
            }

            document.getElementById('playerSourceSummary').textContent = `共 ${playSources.length} 条线路，当前为 ${VideoMeta.getSourceName(source)}`;
            renderSourceTabs();
            renderEpisodeList();
            playVideo(sourceIndex, episodeIndex);
        }

        function renderSourceTabs() {
            document.getElementById('sourceTabs').innerHTML = playSources.map((source, index) => `
                <button class="player-source-tab ${index === sourceIndex ? 'active' : ''}" onclick="switchSource(${index})">
                    <span>${escapeHtml(source.name)}</span>
                    <em>${source.isM3u8 ? 'M3U8' : '线路'}</em>
                </button>
            `).join('');
        }

        function renderEpisodeList() {
            const source = playSources[sourceIndex];
            const list = document.getElementById('episodeList');

            if (!source || !source.episodes || source.episodes.length === 0) {
                list.innerHTML = '<p class="muted-copy">当前线路暂无剧集。</p>';
                return;
            }

            list.innerHTML = `
                <div class="episode-list-head">
                    <span>当前线路</span>
                    <strong>${escapeHtml(source.name)} · ${source.episodes.length} 集</strong>
                </div>
                <div class="episode-scroll">
                    ${source.episodes.map((episode, index) => `
                        <button class="episode-scroll-btn ${index === episodeIndex ? 'active' : ''}" onclick="switchEpisode(${index})">
                            <span>${escapeHtml(episode.name)}</span>
                            <em>${index === episodeIndex ? '播放中' : '播放'}</em>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function switchSource(index) {
            sourceIndex = index;
            episodeIndex = 0;

            document.querySelectorAll('.player-source-tab').forEach((tab, tabIndex) => {
                tab.classList.toggle('active', tabIndex === index);
            });

            document.getElementById('playerSourceSummary').textContent = `共 ${playSources.length} 条线路，当前为 ${VideoMeta.getSourceName(playSources[index])}`;
            renderEpisodeList();
            playVideo(sourceIndex, episodeIndex);
            updateUrl();
        }

        function switchEpisode(index) {
            episodeIndex = index;
            document.querySelectorAll('.episode-scroll-btn').forEach((button, buttonIndex) => {
                button.classList.toggle('active', buttonIndex === index);
            });
            playVideo(sourceIndex, episodeIndex);
            updateUrl();
        }

        function resetNativeHandlers() {
            ensurePlayerElements();
            video.onloadedmetadata = null;
            video.onerror = null;
        }

        async function playVideo(sourceIdx, episodeIdx) {
            const source = playSources[sourceIdx];
            const episode = source?.episodes?.[episodeIdx];
            if (!source || !episode) {
                showError('播放源不可用');
                return;
            }

            const currentRequestId = ++playRequestId;
            let url = String(episode.url || '').trim();

            document.getElementById('episodeName').textContent = `正在播放：${episode.name}`;
            showLoading(true, '正在解析播放线路...');
            resetNativeHandlers();

            if (hls) {
                hls.destroy();
                hls = null;
            }

            try {
                url = await PlaybackResolver.resolve(url);
            } catch (error) {
                if (currentRequestId !== playRequestId) {
                    return;
                }

                console.error('解析播放地址失败:', error);
                showError(`解析播放地址失败：${error.message}`);
                return;
            }

            if (currentRequestId !== playRequestId) {
                return;
            }

            const isM3u8 = url.includes('.m3u8') || url.includes('m3u8');
            const playbackUrl = isM3u8 ? PlaybackResolver.toStreamUrl(url) : url;
            showLoading(true, '正在连接播放线路...');

            if (isM3u8) {
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    hls = new Hls({
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        enableWorker: true
                    });
                    hls.loadSource(playbackUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        showLoading(false);
                        video.play().catch(() => {});
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (!data.fatal) {
                            return;
                        }

                        showLoading(false);
                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR && hls) {
                            hls.recoverMediaError();
                            return;
                        }

                        showError('视频加载失败，请尝试切换其他线路');
                    });
                    return;
                }

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = playbackUrl;
                    video.onloadedmetadata = function() {
                        showLoading(false);
                        video.play().catch(() => {});
                    };
                    video.onerror = function() {
                        showLoading(false);
                        showError('视频加载失败');
                    };
                    return;
                }

                showLoading(false);
                showError('当前浏览器不支持 HLS 播放');
                return;
            }

            video.src = playbackUrl;
            video.onloadedmetadata = function() {
                showLoading(false);
                video.play().catch(() => {});
            };
            video.onerror = function() {
                showLoading(false);
                showError('视频加载失败');
            };
        }

        function updateUrl() {
            const url = new URL(window.location);
            url.searchParams.set('source', sourceIndex);
            url.searchParams.set('ep', episodeIndex);
            history.replaceState({}, '', url);
        }

        function goBack() {
            if (playerMode === 'iptv') {
                window.location.href = 'ipv6.html';
                return;
            }

            if (videoId) {
                window.location.href = getDetailUrl(videoId, currentSource?.id);
                return;
            }
            window.location.href = 'index.html';
        }

        function reloadAll() {
            if (playerMode === 'iptv') {
                window.location.href = 'ipv6.html';
                return;
            }

            currentSource = SourceManager.getCurrentSource();
            const url = new URL(window.location);
            url.searchParams.set('source_id', currentSource.id);
            window.location.href = url.toString();
        }

        function showError(message) {
            showLoading(false);
            const backLabel = playerMode === 'iptv' ? '返回 IPv6 库' : '返回详情';
            const backHref = playerMode === 'iptv' ? 'ipv6.html' : 'index.html';
            const helpText = playerMode === 'iptv'
                ? '可以返回 IPv6 库更换频道，或稍后重试当前直播源。'
                : '可以返回详情页更换线路，或切换片源后重试。';
            document.getElementById('videoWrapper').innerHTML = `
                <div class="player-error">
                    <div class="icon">😢</div>
                    <h3>${escapeHtml(message)}</h3>
                    <p>${escapeHtml(helpText)}</p>
                    <div class="player-error-actions">
                        <button class="btn-primary" onclick="goBack()">${escapeHtml(backLabel)}</button>
                        <a class="btn-secondary" href="${backHref}">回到入口</a>
                    </div>
                </div>
            `;
        }

        ensurePlayerElements();
        init();
    </script>
</body>
</html>
